appId: com.alarma.anti-procrastinacion
productName: Alarma Anti-Procrastinacion
copyright: Copyright (c) 2026 UNAMAD Systems Engineering

directories:
  output: release

asar: false

files:
  - electron
  - package.json

extraResources:
  - from: backend
    to: backend
  - from: database
    to: database
  - from: frontend
    to: frontend

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: frontend/icons/icon-256.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  runAfterFinish: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Alarma Anti-Procrastinacion
